name: Weekly discovery (propose-only)

# Proposes new sources/entities into the discovered_* tables for human review
# at /discovery. Writes NOTHING else: no sources rows, no organizations rows,
# no collection. See docs/discovery-engine-design.md.
#
# Same dual-UTC + guard pattern as daily-collect: both crons are Sunday, the
# guard keeps whichever lands at 7am Eastern. workflow_dispatch bypasses the
# guard for manual runs. Deliberately NO healthcheck ping — a missed discovery
# week is not an incident (a failed run still shows red in Actions).

on:
  schedule:
    - cron: "17 11 * * 0"  # Sun 7:17am EDT (UTC-4)
    - cron: "17 12 * * 0"  # Sun 7:17am EST (UTC-5)
  workflow_dispatch: {}

concurrency:
  group: weekly-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether it's actually 7am Eastern right now
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ="America/Toronto" date +%H)
          if [ "$hour" = "07" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: it's ${hour}:00 in America/Toronto, not 07:00."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run discovery (propose-only)
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.discovery

      # PS Canada funding programs change rarely (~30 standing programs), so
      # they ride the weekly cadence rather than the daily one. Ordered after
      # discovery: a collector failure here must not cost the discovery pass.
      - name: Run PS Canada funding-programs collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.grants_pscanada

      # Federal grant/contribution awards (open.canada.ca datastore API).
      # Steady state is ~one API page per department; open.canada.ca's
      # 20s Crawl-delay is honored, so the first windowed ingest takes a few
      # minutes — weekly cadence absorbs that easily.
      - name: Run federal awards collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.grants_federal_awards

      # Federal contract awards (open.canada.ca datastore API). The awarded-rung
      # source. Materiality-floored ($100k) and windowed (2024-04-01), newest-
      # first, 50/dept/run; the 20s Crawl-delay is honored, so the first
      # windowed ingest takes a few minutes. Ordered before the proposer so its
      # awards (and their procurement_id hard keys) are available to cluster.
      - name: Run federal contracts collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.contracts_federal

      # Corpus hygiene: suppress AR1 noise (materiality 1 AND speculative AND no
      # amount AND not defence-tagged) from the live corpus, stamping
      # suppressed_by='triage@v1'. Under the editorial model there is no approval
      # gate -- signals are corpus-live on insert, and this is the only automated
      # write to review state. Ordered BEFORE the proposer so suppressed noise is
      # excluded from clustering. Touches only suppression state: never a
      # prediction, never a procurement. See docs/editorial-model-redesign.md.
      - name: Run corpus-hygiene triage (suppress AR1 noise)
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.triage --apply

      # Procurement proposer (propose-only, like discovery): clusters the
      # week's graded signals into candidate procurements for human review on
      # the Procurements page. Writes only procurements + procurement_signals
      # as 'proposed'. Ordered last: it reads signals the collectors and
      # extractor have produced, and a failure here costs nothing upstream.
      - name: Run procurement proposer (propose-only)
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.procurement_proposer

      # Reconcile predictions (propose-only): proposes 'correct' when public
      # evidence reached a claim's predicted rung within its horizon, and
      # 'expired' when a horizon has lapsed unsettled. A human confirms every
      # outcome. Ordered last: it reads the signals and procurement links the
      # steps above produced.
      - name: Run prediction reconcile (propose-only)
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.reconcile

      # OpenTimestamps anchoring: submit each un-anchored claim's hash to the
      # public calendars so its existence-by-date is provable to a third party,
      # independent of our own database and clock. Folded into the reconcile
      # unit. A calendar outage just leaves a claim unanchored for next week.
      - name: Anchor predictions (OpenTimestamps)
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.anchor
