name: Daily CanadaBuys collector

on:
  # GitHub Actions cron is always UTC, and Eastern time shifts between
  # UTC-5 (EST) and UTC-4 (EDT) with daylight saving. Rather than track
  # the DST calendar here, we trigger at both possible UTC times for 6am
  # Eastern and let the "guard" step below skip the one that isn't
  # actually 6am Eastern that day.
  #
  # We fire at minute 17 rather than :00 on purpose: GitHub's scheduled
  # runs are best-effort and the top of the hour is the highest-contention
  # slot, where runs are most often delayed or silently dropped. The guard
  # below only checks the hour, so any minute within the 6am ET hour works.
  schedule:
    - cron: "17 10 * * *"  # 6:17am EDT (UTC-4)
    - cron: "17 11 * * *"  # 6:17am EST (UTC-5)
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether it's actually 6am Eastern right now
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ="America/Toronto" date +%H)
          if [ "$hour" = "06" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: it's ${hour}:00 in America/Toronto, not 06:00."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.main

      # Dead-man's switch: ping healthchecks.io only after a real collection
      # run has SUCCEEDED. success() is false if any step above failed, so a
      # failed run sends no ping and healthchecks.io alerts on the miss. The
      # skipped guard=false invocation never reaches here. No-ops safely if
      # the secret isn't configured yet, so it can't break a run.
      - name: Ping healthchecks.io
        if: steps.guard.outputs.should_run == 'true' && success()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 --retry 5 "$HEALTHCHECK_URL" && echo "healthcheck pinged"
          else
            echo "HEALTHCHECK_URL not set; skipping ping."
          fi
