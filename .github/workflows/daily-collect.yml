name: Daily CanadaBuys collector

on:
  # PRIMARY TRIGGER is external: cron-job.org calls the workflow_dispatch API
  # at 6:17am America/Toronto. GitHub's own scheduler is best-effort and has
  # proven unreliable for this repo (it dropped runs on consecutive mornings
  # and delivered others hours late), so we do NOT depend on it.
  #
  # The two cron entries below are a FALLBACK only. GitHub cron is always UTC,
  # and Eastern shifts between UTC-5 (EST) and UTC-4 (EDT) with DST, so we fire
  # at both possible UTC times for 6am Eastern and let the guard step skip the
  # one that isn't actually 6am Eastern that day. Minute :17 (not :00) avoids
  # the highest-contention top-of-hour slot. A workflow_dispatch run bypasses
  # the guard entirely (see the guard step), so the external trigger always
  # does real work regardless of what hour GitHub delivers it.
  schedule:
    - cron: "17 10 * * *"  # 6:17am EDT (UTC-4) — fallback
    - cron: "17 11 * * *"  # 6:17am EST (UTC-5) — fallback
  workflow_dispatch: {}

# Serialize runs so the collector can never execute concurrently with itself.
# The app-layer dedup (content_hash check-then-insert) is idempotent for
# sequential runs but has a check-then-insert race if two runs overlap exactly.
# With the external primary + GitHub fallback both able to fire, this guarantees
# the second run queues behind the first (cancel-in-progress: false) and then
# finds every content_hash already present, so double-runs are provably harmless.
concurrency:
  group: daily-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Check whether it's actually 6am Eastern right now
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          hour=$(TZ="America/Toronto" date +%H)
          if [ "$hour" = "06" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: it's ${hour}:00 in America/Toronto, not 06:00."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.guard.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.main

      # Board minutes ride the same guard and the workflow-level concurrency
      # group. A failure here fails the job, so the healthcheck ping below is
      # withheld and the dead-man's switch pages on it.
      - name: Run board minutes collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.board_minutes

      # Windsor open-data bids + MERX-Ottawa solicitations: light requests
      # collectors on the board-minutes politeness pattern, no Chromium
      # (docs/merx-windsor-design.md section 6). Each fails loudly on an
      # empty page, so a gated or changed endpoint goes RED, never silent.
      - name: Run Windsor open-data tenders collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.tenders_windsor

      - name: Run MERX-Ottawa tenders collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.tenders_merx

      - name: Run newsroom RSS collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.rss_collector

      # Ontario grants: daily on the open funding directory — new programs
      # and deadline changes are the signal. The closed-archive baseline is a
      # separate one-time manual run (--baseline), never scheduled.
      - name: Run Ontario grants collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.grants_ontario

      # Infrastructure Ontario newsroom: publisher-official provincial
      # infrastructure award announcements (proxy-coverage leg for the parked
      # IO MERX buyer page). Requests-based, sitemap-driven, per-run cap;
      # fails loudly on an empty sitemap.
      - name: Run Infrastructure Ontario newsroom collector
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.io_newsroom

      # Dead-man's switch: ping healthchecks.io only after a real collection
      # run has SUCCEEDED. success() is false if any step above failed, so a
      # failed run sends no ping and healthchecks.io alerts on the miss. The
      # skipped guard=false invocation never reaches here. No-ops safely if
      # the secret isn't configured yet, so it can't break a run.
      - name: Ping healthchecks.io
        if: steps.guard.outputs.should_run == 'true' && success()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -n "$HEALTHCHECK_URL" ]; then
            curl -fsS -m 10 --retry 5 "$HEALTHCHECK_URL" && echo "healthcheck pinged"
          else
            echo "HEALTHCHECK_URL not set; skipping ping."
          fi

      # Signal extraction (FORWARD types only): turn freshly collected
      # tender_notice / news_release / grant_program DOCUMENTS into graded
      # SIGNALS, newest event date first, capped at 50/run. This is the step
      # that lets the weekly brief populate (the brief selects on signals, not
      # documents, and these are the only types that carry closing-soon signal a
      # subscriber can act on. The award/board-minutes backlog drains on a
      # separate lower-priority pass (extract-backfill.yml), so this run's token
      # budget is never spent on reconciliation fuel. Opus 4.8: a Haiku-vs-Opus
      # comparison on real tender/news docs showed Haiku dropping the tender
      # reference number (the procurement hard key) on 2 of 5 tenders and
      # mislabeling close dates as open dates, with no human gate downstream to
      # catch it. Opus captured the reference on all 5 and the buyer/funder
      # correctly. ~$9/mo at this cadence is worth the fidelity.
      #
      # Placed AFTER the healthcheck ping ON PURPOSE: extraction depends on the
      # Anthropic API, an external dependency. A transient LLM outage should NOT
      # suppress the dead-man's-switch ping (collection already succeeded) or page
      # the operator at 6am. It still fails the job, so a real problem shows RED
      # in Actions -- loud, but not a page.
      - name: Extract forward-signal documents into signals
        if: steps.guard.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRACTION_MODEL: claude-opus-4-8
        run: >
          python -m src.signal_extractor
          --doc-types tender_notice,news_release,grant_program
          --newest-first --limit 50
